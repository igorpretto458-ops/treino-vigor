<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Treino Premium · Igor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0D1117; font-family: -apple-system, 'Inter', sans-serif; color: #F9FAFB; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  button { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Header */
  .header { padding: 48px 16px 16px; border-bottom: 1px solid #1F2937; }
  .header-eyebrow { color: #6B7280; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
  .header-name { color: #F9FAFB; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-top: 2px; }
  .header-sub { color: #6B7280; font-size: 12px; margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; background: #111827; border-bottom: 1px solid #1F2937; padding: 0 8px; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 10px 4px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; color: #6B7280; font-size: 12px; font-weight: 600; transition: all 0.15s; }
  .tab.active { color: #60A5FA; border-bottom-color: #3B82F6; }
  .tab-icon { font-size: 18px; }
  .tab-label { margin-top: 2px; }

  /* Screens */
  .screen { display: none; padding: 20px 16px 100px; }
  .screen.active { display: block; }

  /* Section label */
  .section-label { color: #6B7280; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }

  /* Today card */
  .today-card { width: 100%; padding: 18px 20px; border-radius: 16px; border: none; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .today-icon { font-size: 32px; }
  .today-text { flex: 1; }
  .today-eyebrow { color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 600; }
  .today-title { color: #fff; font-size: 18px; font-weight: 800; }
  .today-count { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
  .today-arrow { color: rgba(255,255,255,0.5); font-size: 22px; }

  /* Day list */
  .day-list { display: flex; flex-direction: column; gap: 8px; }
  .day-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 14px; background: #111827; border: 1px solid #1F2937; cursor: pointer; text-align: left; width: 100%; transition: border-color 0.2s; }
  .day-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .day-card-text { flex: 1; }
  .day-card-eyebrow { color: #9CA3AF; font-size: 11px; font-weight: 600; }
  .day-card-title { color: #F9FAFB; font-size: 14px; font-weight: 700; }
  .day-card-arrow { color: #374151; font-size: 20px; }
  .done-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

  /* Workout detail */
  #workout-detail { display: none; position: fixed; inset: 0; background: #0D1117; overflow-y: auto; z-index: 100; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }
  .workout-header { padding: 48px 16px 24px; }
  .back-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 10px; color: #fff; padding: 6px 14px; font-size: 14px; cursor: pointer; margin-bottom: 14px; font-family: inherit; }
  .workout-title-row { display: flex; align-items: flex-start; gap: 12px; }
  .workout-header-icon { font-size: 36px; }
  .workout-eyebrow { color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 600; letter-spacing: 1px; }
  .workout-title { color: #fff; font-size: 22px; font-weight: 800; line-height: 1.2; }
  .last-done { margin-top: 12px; background: rgba(0,0,0,0.25); border-radius: 10px; padding: 6px 14px; display: inline-block; color: rgba(255,255,255,0.8); font-size: 12px; }

  .ex-list { padding: 16px 16px 0; }
  .ex-card { background: #111827; border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .ex-header { padding: 12px 16px 10px; border-bottom: 1px solid #1F2937; display: flex; align-items: center; justify-content: space-between; }
  .ex-name { color: #F9FAFB; font-weight: 700; font-size: 15px; }
  .ex-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .ex-series { display: flex; gap: 8px; padding: 10px 16px; flex-wrap: wrap; }
  .serie-box { flex: 1 1 60px; min-width: 60px; max-width: 80px; }
  .serie-label { color: #6B7280; font-size: 10px; text-align: center; margin-bottom: 4px; font-weight: 600; }
  .serie-input { width: 100%; padding: 8px 4px; text-align: center; background: #1F2937; border: 1.5px solid #374151; border-radius: 8px; color: #9CA3AF; font-size: 14px; font-weight: 600; outline: none; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
  .serie-input.filled { color: #fff; }

  .done-btn { margin: 8px 16px 0; width: calc(100% - 32px); padding: 16px; border-radius: 14px; border: none; color: #fff; font-weight: 800; font-size: 17px; cursor: pointer; letter-spacing: 0.5px; font-family: inherit; }

  /* Weight */
  .card { background: #111827; border-radius: 16px; padding: 20px; }
  .card-title { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .card-title-text { color: #fff; font-weight: 700; font-size: 16px; }
  .weight-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .weight-input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #374151; background: #1F2937; color: #fff; font-size: 16px; outline: none; font-family: inherit; }
  .add-btn { padding: 10px 18px; border-radius: 10px; border: none; background: #3B82F6; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .weight-rows { display: flex; flex-direction: column; gap: 6px; }
  .weight-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1F2937; border-radius: 8px; }
  .weight-row.latest { background: #1E3A5F; }
  .weight-row-week { color: #9CA3AF; font-size: 13px; }
  .weight-row-date { color: #6B7280; font-size: 12px; }
  .weight-row-kg { color: #fff; font-weight: 500; font-size: 15px; }
  .weight-row.latest .weight-row-kg { color: #60A5FA; font-weight: 700; }
  .diff-badge { margin-left: auto; font-size: 13px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .empty-msg { color: #6B7280; font-size: 13px; text-align: center; }

  /* Checklist */
  .checklist-table { width: 100%; border-collapse: collapse; }
  .checklist-table th { padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 700; color: #6B7280; letter-spacing: 0.5px; }
  .checklist-table th:first-child { text-align: left; padding-left: 16px; color: #6B7280; font-size: 11px; letter-spacing: 1px; }
  .checklist-table td { padding: 8px 2px; text-align: center; border-top: 1px solid #1F2937; }
  .checklist-table td:first-child { text-align: left; padding-left: 16px; color: #D1D5DB; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .check-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: #1F2937; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s; color: #fff; font-family: inherit; }

  .note { color: #6B7280; font-size: 11px; text-align: center; padding: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">TREINO PREMIUM</div>
  <div class="header-name">Igor Pretto</div>
  <div class="header-sub">Hipertrofia · Emagrecimento · Shape em V</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('treinos')">
    <div class="tab-icon">🏋️</div>
    <div class="tab-label">Treinos</div>
  </button>
  <button class="tab" onclick="switchTab('peso')">
    <div class="tab-icon">⚖️</div>
    <div class="tab-label">Peso</div>
  </button>
  <button class="tab" onclick="switchTab('check')">
    <div class="tab-icon">✅</div>
    <div class="tab-label">Hábitos</div>
  </button>
</div>

<!-- TREINOS -->
<div id="screen-treinos" class="screen active">
  <div id="today-section"></div>
  <div class="section-label">TODOS OS TREINOS</div>
  <div class="day-list" id="day-list"></div>
</div>

<!-- PESO -->
<div id="screen-peso" class="screen">
  <div class="card">
    <div class="card-title">
      <span style="font-size:20px">⚖️</span>
      <span class="card-title-text">Controle de Peso</span>
      <span id="diff-badge" class="diff-badge" style="display:none"></span>
    </div>
    <div class="weight-input-row">
      <input class="weight-input" type="number" id="weight-input" placeholder="Ex: 82.5" step="0.1">
      <button class="add-btn" onclick="addWeight()">+ kg</button>
    </div>
    <div class="weight-rows" id="weight-rows">
      <p class="empty-msg">Nenhum peso registrado ainda</p>
    </div>
  </div>
</div>

<!-- CHECKLIST -->
<div id="screen-check" class="screen">
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:16px 20px 12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">✅</span>
      <span class="card-title-text">Checklist Semanal</span>
    </div>
    <div style="overflow-x:auto">
      <table class="checklist-table" id="checklist-table"></table>
    </div>
    <p class="note">Toque nas células para marcar ✓</p>
  </div>
</div>

<!-- WORKOUT DETAIL -->
<div id="workout-detail">
  <div id="workout-header-bg" class="workout-header">
    <button class="back-btn" onclick="closeWorkout()">← Voltar</button>
    <div class="workout-title-row">
      <span id="wd-icon" class="workout-header-icon"></span>
      <div>
        <div id="wd-eyebrow" class="workout-eyebrow"></div>
        <div id="wd-title" class="workout-title"></div>
      </div>
    </div>
    <div id="wd-last" class="last-done" style="display:none"></div>
  </div>
  <div class="ex-list" id="ex-list"></div>
  <div style="padding:8px 16px 0">
    <button id="done-btn" class="done-btn" onclick="markDone()">Treino concluído ✓</button>
  </div>
</div>

<script>
const WORKOUTS = {
  seg: { label:"Segunda", sublabel:"Superior A", color:"#E53935", dark:"#B71C1C", icon:"💪", focus:"Peito · Costas · Ombros",
    exercises:[{name:"Supino reto",s:4,r:"6–8"},{name:"Puxada alta",s:4,r:"8–10"},{name:"Supino inclinado",s:3,r:"8–10"},{name:"Remada cavalinho",s:3,r:"8–10"},{name:"Desenvolvimento",s:3,r:"8–10"},{name:"Elevação lateral",s:4,r:"12–15"}]},
  ter: { label:"Terça", sublabel:"Inferior A", color:"#1E88E5", dark:"#0D47A1", icon:"🦵", focus:"Quad · Glúteo · Panturrilha",
    exercises:[{name:"Agachamento",s:4,r:"6–8"},{name:"Leg Press",s:4,r:"10–12"},{name:"Afundo",s:3,r:"10"},{name:"Extensora",s:3,r:"12–15"},{name:"Panturrilha",s:5,r:"12–15"}]},
  qui: { label:"Quinta", sublabel:"Superior B", color:"#8E24AA", dark:"#4A148C", icon:"🔝", focus:"Peito · Costas · Rotadores",
    exercises:[{name:"Supino máquina",s:4,r:"8–10"},{name:"Crucifixo",s:3,r:"12–15"},{name:"Remada baixa",s:4,r:"10–12"},{name:"Pulldown",s:3,r:"12–15"},{name:"Face pull",s:3,r:"12–15"}]},
  sex: { label:"Sexta", sublabel:"Inferior B", color:"#00897B", dark:"#004D40", icon:"🍑", focus:"Posterior · Glúteo · Isquio",
    exercises:[{name:"Terra romeno",s:4,r:"6–8"},{name:"Mesa flexora",s:4,r:"10–12"},{name:"Hip thrust",s:4,r:"8–10"},{name:"Passada",s:3,r:"12"}]},
  extra: { label:"Extra", sublabel:"Iso", color:"#FB8C00", dark:"#E65100", icon:"⚡", focus:"Ombros · Bíceps · Tríceps",
    exercises:[{name:"Elevação lateral",s:6,r:"15"},{name:"Rosca Scott",s:4,r:"10–12"},{name:"Rosca martelo",s:3,r:"12"},{name:"Tríceps corda",s:4,r:"12"}]}
};

const CHECKLIST = ["🏋️ Treino","🏃 Cardio","💧 Água","😴 Sono 7h+"];
const DAYS = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
const DAY_COLORS = ["#EF4444","#F97316","#EAB308","#22C55E","#3B82F6","#8B5CF6","#EC4899"];
const DAY_MAP = {1:"seg",2:"ter",4:"qui",5:"sex"};

let activeDay = null;

function load() { try { return JSON.parse(localStorage.getItem("igor_treino_v3") || "{}"); } catch { return {}; } }
function save(d) { try { localStorage.setItem("igor_treino_v3", JSON.stringify(d)); } catch {} }
let DATA = load();

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("screen-" + tab).classList.add("active");
  event.currentTarget.classList.add("active");
  if (tab === "treinos") renderHome();
  if (tab === "peso") renderWeight();
  if (tab === "check") renderChecklist();
}

// ── Home ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const todayKey = DAY_MAP[new Date().getDay()];
  const todaySection = document.getElementById("today-section");

  if (todayKey) {
    const w = WORKOUTS[todayKey];
    todaySection.innerHTML = `
      <div class="section-label">HOJE</div>
      <button class="today-card" onclick="openWorkout('${todayKey}')"
        style="background:linear-gradient(135deg,${w.color},${w.dark});margin-bottom:20px">
        <span class="today-icon">${w.icon}</span>
        <div class="today-text">
          <div class="today-eyebrow">${w.label} · ${w.sublabel}</div>
          <div class="today-title">${w.focus}</div>
          <div class="today-count">${w.exercises.length} exercícios</div>
        </div>
        <span class="today-arrow">›</span>
      </button>`;
  } else {
    todaySection.innerHTML = "";
  }

  const list = document.getElementById("day-list");
  list.innerHTML = Object.entries(WORKOUTS).map(([key, w]) => {
    const done = DATA[key + "_done"];
    const badge = done
      ? `<span class="done-badge" style="background:${w.color}22;color:${w.color}">✓ ${done}</span>`
      : `<span class="day-card-arrow">›</span>`;
    return `
      <button class="day-card" onclick="openWorkout('${key}')"
        style="border-color:${done ? w.color + "55" : "#1F2937"}">
        <div class="day-card-icon" style="background:${w.color}22">${w.icon}</div>
        <div class="day-card-text">
          <div class="day-card-eyebrow">${w.label} · ${w.sublabel}</div>
          <div class="day-card-title">${w.focus}</div>
        </div>
        ${badge}
      </button>`;
  }).join("");
}

// ── Workout detail ────────────────────────────────────────────────────────────
function openWorkout(key) {
  activeDay = key;
  const w = WORKOUTS[key];
  const detail = document.getElementById("workout-detail");
  const hdr = document.getElementById("workout-header-bg");
  hdr.style.background = `linear-gradient(135deg,${w.color},${w.dark})`;
  document.getElementById("wd-icon").textContent = w.icon;
  document.getElementById("wd-eyebrow").textContent = `${w.label.toUpperCase()} — ${w.sublabel.toUpperCase()}`;
  document.getElementById("wd-title").textContent = w.focus;

  const lastEl = document.getElementById("wd-last");
  const done = DATA[key + "_done"];
  if (done) { lastEl.style.display = "inline-block"; lastEl.textContent = "✓ Último treino: " + done; }
  else { lastEl.style.display = "none"; }

  document.getElementById("done-btn").style.background = `linear-gradient(135deg,${w.color},${w.dark})`;

  const logs = DATA[key] || {};
  document.getElementById("ex-list").innerHTML = w.exercises.map(ex => {
    const exLogs = logs[ex.name] || [];
    const series = Array.from({length: ex.s}, (_,i) => {
      const val = exLogs[i] || "";
      return `<div class="serie-box">
        <div class="serie-label">S${i+1}</div>
        <input class="serie-input ${val ? 'filled' : ''}" type="number" placeholder="kg"
          value="${val}" data-ex="${encodeURIComponent(ex.name)}" data-si="${i}"
          oninput="updateWeight(this)" style="border-color:${val ? w.color : '#374151'}">
      </div>`;
    }).join("");
    return `<div class="ex-card" style="border:1px solid ${w.color}22">
      <div class="ex-header">
        <span class="ex-name">${ex.name}</span>
        <span class="ex-badge" style="background:${w.color}22;color:${w.color}">${ex.s}×${ex.r}</span>
      </div>
      <div class="ex-series">${series}</div>
    </div>`;
  }).join("");

  detail.style.display = "block";
  detail.scrollTop = 0;
}

function updateWeight(input) {
  const exName = decodeURIComponent(input.dataset.ex);
  const si = parseInt(input.dataset.si);
  const val = input.value;
  const w = WORKOUTS[activeDay];
  if (!DATA[activeDay]) DATA[activeDay] = {};
  const ex = WORKOUTS[activeDay].exercises.find(e => e.name === exName);
  if (!DATA[activeDay][exName]) DATA[activeDay][exName] = Array(ex.s).fill("");
  DATA[activeDay][exName][si] = val;
  input.classList.toggle("filled", !!val);
  input.style.borderColor = val ? w.color : "#374151";
  input.style.color = val ? "#fff" : "#9CA3AF";
  save(DATA);
}

function markDone() {
  const today = new Date().toLocaleDateString("pt-BR");
  DATA[activeDay + "_done"] = today;
  save(DATA);
  closeWorkout();
}

function closeWorkout() {
  document.getElementById("workout-detail").style.display = "none";
  renderHome();
}

// ── Weight ────────────────────────────────────────────────────────────────────
function renderWeight() {
  const weights = DATA.weights || [];
  const rows = document.getElementById("weight-rows");
  const diffBadge = document.getElementById("diff-badge");

  if (weights.length === 0) {
    rows.innerHTML = '<p class="empty-msg">Nenhum peso registrado ainda</p>';
    diffBadge.style.display = "none";
    return;
  }

  const last = weights[weights.length - 1];
  const prev = weights[weights.length - 2];
  if (last && prev) {
    const diff = (last.kg - prev.kg).toFixed(1);
    const pos = parseFloat(diff) > 0;
    diffBadge.style.display = "inline-block";
    diffBadge.textContent = (pos ? "+" : "") + diff + " kg";
    diffBadge.style.background = pos ? "#450A0A" : "#064E3B";
    diffBadge.style.color = pos ? "#F87171" : "#34D399";
  } else {
    diffBadge.style.display = "none";
  }

  rows.innerHTML = [...weights].reverse().map((w, i) => `
    <div class="weight-row ${i === 0 ? 'latest' : ''}">
      <span class="weight-row-week">Sem. ${weights.length - i}</span>
      <span class="weight-row-date">${w.date}</span>
      <span class="weight-row-kg">${w.kg} kg</span>
    </div>`).join("");
}

function addWeight() {
  const input = document.getElementById("weight-input");
  const v = parseFloat(input.value.replace(",", "."));
  if (isNaN(v) || v < 30 || v > 300) return;
  const entry = { date: new Date().toLocaleDateString("pt-BR"), kg: v };
  DATA.weights = [...(DATA.weights || []), entry].slice(-12);
  save(DATA);
  input.value = "";
  renderWeight();
}

document.getElementById("weight-input").addEventListener("keydown", e => {
  if (e.key === "Enter") addWeight();
});

// ── Checklist ─────────────────────────────────────────────────────────────────
function renderChecklist() {
  const today = new Date().getDay();
  const todayIdx = today === 0 ? 6 : today - 1;
  const cl = DATA.checklist || {};

  const thead = `<thead><tr>
    <th>HÁBITO</th>
    ${DAYS.map((d,i) => `<th style="color:${i===todayIdx?DAY_COLORS[i]:'#6B7280'}">${d}</th>`).join("")}
  </tr></thead>`;

  const tbody = `<tbody>${CHECKLIST.map(item => {
    const cells = DAYS.map((_, di) => {
      const key = item + "_" + di;
      const checked = !!cl[key];
      return `<td><button class="check-btn" onclick="toggleCheck('${encodeURIComponent(item)}',${di})"
        style="background:${checked ? DAY_COLORS[di] : '#1F2937'}">${checked ? "✓" : ""}</button></td>`;
    }).join("");
    return `<tr><td>${item}</td>${cells}</tr>`;
  }).join("")}</tbody>`;

  document.getElementById("checklist-table").innerHTML = thead + tbody;
}

function toggleCheck(item, di) {
  item = decodeURIComponent(item);
  const key = item + "_" + di;
  if (!DATA.checklist) DATA.checklist = {};
  DATA.checklist[key] = !DATA.checklist[key];
  save(DATA);
  renderChecklist();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
